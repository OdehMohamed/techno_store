name: techno_store
description: A new Flutter project.


publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ">=2.16.1 <3.0.0"


dependencies:
  flutter:
    sdk: flutter


  
  cupertino_icons: ^1.0.2
  fluttertoast: ^8.1.1
  auto_size_text: ^3.0.0
  fluttericon: ^2.0.0
  file_picker: ^5.2.4
