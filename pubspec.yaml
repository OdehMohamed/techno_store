      url: https://github.com/Abdtatari/intl_phone_number_input.git
  pattern_lock:
    git:
      url: https://github.com/Abdtatari/patternLock.git
  firebase_core: ^2.4.0
  firebase_auth: ^4.2.1
  photo_view: ^0.14.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^1.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/
