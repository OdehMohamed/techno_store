name: techno_store
description: A new Flutter project.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  another_flushbar: ^1.12.30
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  change_app_package_name: ^1.5.0
  cloud_firestore: ^5.6.3
  cupertino_icons: ^1.0.2
  easy_localization: ^3.0.1
  file_picker: ^8.3.1
  firebase_auth: ^5.4.2
  firebase_core: ^3.11.0
  firebase_storage: ^12.4.2
  flutter:
    sdk: flutter
  flutter_advanced_drawer: ^1.5.0
  flutter_bloc: ^9.1.1
  flutter_colorpicker: ^1.0.3
  flutter_form_builder: ^10.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_slidable: ^4.0.3
  fluttericon: ^2.0.0
  fluttertoast: ^8.1.1
  form_builder_validators: ^11.1.1
  image_picker: ^1.0.7
  in_app_update: ^4.0.1
  intl_phone_number_input: ^0.7.5
  modal_progress_hud_nsn: ^0.5.1
  pattern_lock:
    git:
      url: https://github.com/Abdtatari/patternLock.git
  photo_view: ^0.15.0
  provider: ^6.0.5
  scrollable_positioned_list: ^0.3.5
  shared_preferences: ^2.5.3
  url_launcher: ^6.1.7
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^1.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_white.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_white.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21
  ## below is command to generate the icon
  ## flutter pub run flutter_launcher_icons:main

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
    - assets/data/
